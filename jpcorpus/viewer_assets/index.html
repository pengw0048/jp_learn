<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jpcorpus viewer</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">日</span>
          <div>
            <h1 data-i18n="appTitle">个人日语语料</h1>
            <p id="generated-at" class="subtle"></p>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="summary-strip" class="summary-strip"></div>
          <div class="segmented mode-segmented" aria-label="Mode">
            <button type="button" data-mode="study" data-i18n="studyMode">学习</button>
            <button type="button" data-mode="browse" data-i18n="browseMode">浏览</button>
            <button type="button" data-mode="read" data-i18n="readMode">阅读</button>
          </div>
          <button id="maintenance-toggle" class="maintenance-toggle" type="button" data-i18n="maintenance">维护</button>
          <div class="segmented" aria-label="Language">
            <button type="button" data-lang="zh">中</button>
            <button type="button" data-lang="en">EN</button>
          </div>
        </div>
      </header>
      <div id="corpus-sync-banner" class="corpus-sync-banner" role="status" aria-live="polite" hidden>
        <span id="corpus-sync-message"></span>
        <button id="corpus-sync-apply" type="button" data-i18n="corpusUpdateApply">应用更新</button>
      </div>
      <section id="source-panel" class="source-panel" hidden>
        <div class="source-panel-header">
          <div>
            <h2 data-i18n="sourceInventoryTitle">来源</h2>
            <p class="maintenance-help" data-i18n="sourceInventoryHelp">选择一个来源阅读或管理导入文本。</p>
          </div>
          <button id="source-panel-close" type="button" aria-label="Close">×</button>
        </div>
        <div id="source-inventory" class="source-inventory"></div>
      </section>

      <main class="workspace">
        <aside class="sidebar">
          <div class="search-wrap">
            <input id="search-input" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" />
          </div>

          <div id="level-filter" class="chip-row" aria-label="JLPT level"></div>

          <div class="toolbar-row">
            <label>
              <span data-i18n="sortLabel">排序</span>
              <select id="sort-select">
                <option value="count" data-i18n="sortCount">频次</option>
                <option value="level" data-i18n="sortLevel">等级</option>
                <option value="word" data-i18n="sortWord">五十音</option>
              </select>
            </label>
            <label>
              <span data-i18n="statusLabel">状态</span>
              <select id="status-filter">
                <option value="all" data-i18n="statusAll">全部</option>
                <option value="none" data-i18n="statusNone">未标记</option>
                <option value="learning" data-i18n="statusLearning">学习中</option>
                <option value="uncertain" data-i18n="statusUncertain">模糊</option>
                <option value="known" data-i18n="statusKnown">认识</option>
                <option value="ignored" data-i18n="statusIgnored">忽略</option>
              </select>
            </label>
            <label>
              <span data-i18n="sourceLabel">来源</span>
              <select id="source-filter">
                <option value="all" data-i18n="sourceAll">全部</option>
                <option value="subtitle" data-i18n="sourceSubtitles">字幕</option>
                <option value="lyrics" data-i18n="sourceLyrics">歌词</option>
                <option value="text" data-i18n="sourceTexts">文本</option>
              </select>
            </label>
          </div>

          <div id="result-count" class="result-count"></div>
          <div id="word-list" class="word-list"></div>
        </aside>

        <div id="split-resizer" class="split-resizer" role="separator" aria-orientation="vertical" tabindex="0"></div>

        <section class="detail-pane">
          <div id="empty-state" class="empty-state">
            <h2 data-i18n="loadingTitle">正在读取语料</h2>
            <p data-i18n="loadingBody">如果这里停住了，请确认本地服务能访问语料文件。</p>
          </div>
          <article id="word-detail" class="word-detail" hidden></article>
        </section>
      </main>
      <section id="maintenance-panel" class="maintenance-panel" hidden>
        <div class="maintenance-header">
          <h2 data-i18n="maintenanceTitle">维护</h2>
          <button id="maintenance-close" type="button" aria-label="Close">×</button>
        </div>
        <section class="maintenance-card">
          <div class="maintenance-section-header">
            <div>
              <h3 data-i18n="quickActionsTitle">常用操作</h3>
              <p class="maintenance-help" data-i18n="quickActionsHelp">平时点“刷新”就够了；词典或词表需要重拉时再用“完整刷新”。</p>
            </div>
          </div>
          <div class="maintenance-action-grid">
            <button type="button" data-maintenance-task="sync_media">
              <strong data-i18n="taskSyncMedia">刷新</strong>
              <span data-i18n="maintenanceTaskSyncMedia">同步动画、字幕、音乐和歌词，并重新生成页面语料</span>
            </button>
            <button type="button" data-maintenance-task="refresh_all">
              <strong data-i18n="taskRefreshAll">完整刷新</strong>
              <span data-i18n="maintenanceTaskRefreshAll">词典、词表和动画库也一起更新；平时不用点这个</span>
            </button>
          </div>
        </section>
        <section class="maintenance-card">
          <div class="maintenance-section-header">
            <div>
              <h3 data-i18n="ttsTitle">朗读</h3>
              <p class="maintenance-help" data-i18n="ttsHelp">朗读设置会自动保存在这个浏览器里。默认使用浏览器日语语音；如果本机开着 VOICEVOX engine，可以切到 VOICEVOX。</p>
            </div>
          </div>
          <div class="tts-settings">
            <div class="segmented tts-provider-segmented" aria-label="Read aloud provider">
              <button type="button" data-tts-provider="browser" data-i18n="ttsProviderBrowser">浏览器语音</button>
              <button type="button" data-tts-provider="voicevox" data-i18n="ttsProviderVoicevox">VOICEVOX</button>
            </div>
            <div class="maintenance-grid tts-settings-grid">
              <label id="tts-browser-voice-field">
                <span data-i18n="ttsBrowserVoice">浏览器声音</span>
                <select id="tts-browser-voice"></select>
              </label>
              <label id="tts-voicevox-speaker-field" hidden>
                <span data-i18n="ttsVoicevoxSpeaker">VOICEVOX 声音</span>
                <select id="tts-voicevox-speaker"></select>
              </label>
              <label class="tts-rate-field">
                <span data-i18n="ttsRate">速度</span>
                <div class="tts-rate-control">
                  <input id="tts-rate" type="range" min="0.6" max="1.4" step="0.05" />
                  <output id="tts-rate-value" for="tts-rate"></output>
                </div>
              </label>
            </div>
            <div class="tts-preview-row">
              <button id="tts-preview" class="secondary-button" type="button" data-i18n="ttsPreview">预览</button>
              <p id="tts-status" class="maintenance-help"></p>
            </div>
          </div>
        </section>
        <section class="maintenance-card">
          <div class="maintenance-section-header">
            <div>
              <h3 data-i18n="dictionaryManagerTitle">本地词典</h3>
              <p class="maintenance-help" data-i18n="dictionaryManagerHelp">导入 Yomitan zip 或 MDX 词典；启用后会显示在词条详情里。</p>
            </div>
          </div>
          <div class="dictionary-import-row">
            <label>
              <span data-i18n="dictionaryFile">词典文件</span>
              <input id="dictionary-file" type="file" accept=".zip,.mdx" />
            </label>
            <label>
              <span data-i18n="dictionaryName">显示名称</span>
              <input id="dictionary-name" type="text" autocomplete="off" data-i18n-placeholder="dictionaryNamePlaceholder" />
            </label>
            <button id="dictionary-import" class="secondary-button" type="button" data-i18n="dictionaryImport">导入</button>
          </div>
          <p id="dictionary-status" class="maintenance-help"></p>
          <div id="dictionary-list" class="dictionary-list"></div>
        </section>
        <section class="maintenance-card">
          <div class="maintenance-section-header">
            <div>
              <h3 data-i18n="configTitle">API key 状态</h3>
              <p id="config-path" class="maintenance-help"></p>
            </div>
          </div>
          <div id="config-status-list" class="config-status-list"></div>
          <details id="config-form" class="config-form">
            <summary data-i18n="configEdit">填写或更新 API key</summary>
            <div class="maintenance-grid">
              <label>
                <span>Bangumi Client ID</span>
                <input id="config-bangumi-client-id" type="text" autocomplete="off" />
              </label>
              <label>
                <span>Bangumi Client Secret</span>
                <input id="config-bangumi-client-secret" type="password" autocomplete="off" />
              </label>
              <label>
                <span>Jimaku API Key</span>
                <input id="config-jimaku-api-key" type="password" autocomplete="off" />
              </label>
              <label>
                <span data-i18n="maintenanceProvider">LLM 接口类型</span>
                <select id="config-llm-provider">
                  <option value="openai-compatible" data-i18n="llmProviderOpenAiCompatible">OpenAI 兼容接口</option>
                  <option value="anthropic" data-i18n="llmProviderAnthropic">Anthropic</option>
                  <option value="apple" data-i18n="llmProviderApple">Apple 本机模型</option>
                </select>
              </label>
              <label>
                <span data-i18n="configLlmBaseUrl">LLM 接口地址</span>
                <input id="config-llm-base-url" type="text" autocomplete="off" />
              </label>
              <label>
                <span data-i18n="configLlmModel">LLM 模型</span>
                <input id="config-llm-model" type="text" autocomplete="off" />
              </label>
              <label>
                <span data-i18n="configLlmApiKey">LLM API Key</span>
                <input id="config-llm-api-key" type="password" autocomplete="off" />
              </label>
            </div>
            <div class="config-form-actions">
              <button id="config-save" class="secondary-button" type="button" data-i18n="configSave">保存 key</button>
              <p id="config-save-status" class="maintenance-help"></p>
            </div>
          </details>
        </section>
        <div id="maintenance-progress" class="maintenance-progress" hidden>
          <div class="maintenance-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <span id="maintenance-progress-fill"></span>
          </div>
          <div id="maintenance-progress-label" class="maintenance-progress-label"></div>
        </div>
        <div class="maintenance-actions">
          <span id="maintenance-status" class="maintenance-status"></span>
        </div>
        <pre id="maintenance-log" class="maintenance-log"></pre>
      </section>
    </div>
    <script src="/app_storage.js"></script>
    <script src="/app_i18n.js"></script>
    <script src="/app_config.js"></script>
    <script src="/app_dom.js"></script>
    <script src="/app_api.js"></script>
    <script src="/app_tts.js"></script>
    <script src="/app_search.js"></script>
    <script src="/app_format.js"></script>
    <script src="/app_lexical.js"></script>
    <script src="/app_study.js"></script>
    <script src="/app_layout.js"></script>
    <script src="/app_maintenance.js"></script>
    <script src="/app_sync.js"></script>
    <script src="/app_sources.js"></script>
    <script src="/app_reader.js"></script>
    <script src="/app_reader_mode.js"></script>
    <script src="/app_ai.js"></script>
    <script src="/app_examples.js"></script>
    <script src="/app_detail.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
