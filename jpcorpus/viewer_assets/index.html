<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jpcorpus viewer</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">日</span>
          <div>
            <h1 data-i18n="appTitle">个人日语语料</h1>
            <p id="generated-at" class="subtle"></p>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="summary-strip" class="summary-strip"></div>
          <div class="segmented mode-segmented" aria-label="Mode">
            <button type="button" data-mode="study" data-i18n="studyMode">学习</button>
            <button type="button" data-mode="browse" data-i18n="browseMode">浏览</button>
            <button type="button" data-mode="read" data-i18n="readMode">阅读</button>
          </div>
          <button id="maintenance-toggle" class="maintenance-toggle" type="button" data-i18n="maintenance">维护</button>
          <div class="segmented" aria-label="Language">
            <button type="button" data-lang="zh">中</button>
            <button type="button" data-lang="en">EN</button>
          </div>
        </div>
      </header>
      <section id="source-panel" class="source-panel" hidden>
        <div class="source-panel-header">
          <div>
            <h2 data-i18n="sourceInventoryTitle">来源概览</h2>
            <p class="maintenance-help" data-i18n="sourceInventoryHelp">按当前页面语料统计，用来确认字幕、歌词、小说是否已经进库。</p>
          </div>
          <button id="source-panel-close" type="button" aria-label="Close">×</button>
        </div>
        <div id="source-inventory" class="source-inventory"></div>
      </section>

      <main class="workspace">
        <aside class="sidebar">
          <div class="search-wrap">
            <input id="search-input" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" />
          </div>

          <div id="level-filter" class="chip-row" aria-label="JLPT level"></div>

          <div class="toolbar-row">
            <label>
              <span data-i18n="sortLabel">排序</span>
              <select id="sort-select">
                <option value="count" data-i18n="sortCount">频次</option>
                <option value="level" data-i18n="sortLevel">等级</option>
                <option value="word" data-i18n="sortWord">五十音</option>
              </select>
            </label>
            <label>
              <span data-i18n="statusLabel">状态</span>
              <select id="status-filter">
                <option value="all" data-i18n="statusAll">全部</option>
                <option value="none" data-i18n="statusNone">未标记</option>
                <option value="learning" data-i18n="statusLearning">复习中</option>
                <option value="uncertain" data-i18n="statusUncertain">模糊</option>
                <option value="known" data-i18n="statusKnown">认识</option>
                <option value="ignored" data-i18n="statusIgnored">忽略</option>
              </select>
            </label>
            <label>
              <span data-i18n="sourceLabel">来源</span>
              <select id="source-filter">
                <option value="all" data-i18n="sourceAll">全部</option>
                <option value="subtitle" data-i18n="sourceSubtitles">字幕</option>
                <option value="lyrics" data-i18n="sourceLyrics">歌词</option>
                <option value="text" data-i18n="sourceTexts">文本</option>
              </select>
            </label>
          </div>

          <div id="result-count" class="result-count"></div>
          <div id="word-list" class="word-list"></div>
        </aside>

        <div id="split-resizer" class="split-resizer" role="separator" aria-orientation="vertical" tabindex="0"></div>

        <section class="detail-pane">
          <div id="empty-state" class="empty-state">
            <h2 data-i18n="loadingTitle">正在读取 corpus.json</h2>
            <p data-i18n="loadingBody">如果这里停住了，请确认本地服务能访问 corpus.json。</p>
          </div>
          <article id="word-detail" class="word-detail" hidden></article>
        </section>
      </main>
      <section id="maintenance-panel" class="maintenance-panel" hidden>
        <div class="maintenance-header">
          <h2 data-i18n="maintenanceTitle">维护</h2>
          <button id="maintenance-close" type="button" aria-label="Close">×</button>
        </div>
        <section class="maintenance-card">
          <div class="maintenance-section-header">
            <div>
              <h3 data-i18n="configTitle">配置状态</h3>
              <p id="config-path" class="maintenance-help"></p>
            </div>
            <button id="config-save" class="secondary-button" type="button" data-i18n="configSave">保存配置</button>
          </div>
          <div id="config-status-list" class="config-status-list"></div>
          <details id="config-form" class="config-form">
            <summary data-i18n="configEdit">填写或更新 key</summary>
            <div class="maintenance-grid">
              <label>
                <span>Bangumi Client ID</span>
                <input id="config-bangumi-client-id" type="text" autocomplete="off" />
              </label>
              <label>
                <span>Bangumi Client Secret</span>
                <input id="config-bangumi-client-secret" type="password" autocomplete="off" />
              </label>
              <label>
                <span>Jimaku API Key</span>
                <input id="config-jimaku-api-key" type="password" autocomplete="off" />
              </label>
              <label>
                <span data-i18n="maintenanceProvider">Provider</span>
                <select id="config-llm-provider">
                  <option value="openai-compatible">OpenAI compatible</option>
                  <option value="anthropic">Anthropic</option>
                  <option value="apple">Apple</option>
                </select>
              </label>
              <label>
                <span data-i18n="configLlmBaseUrl">LLM Base URL</span>
                <input id="config-llm-base-url" type="text" autocomplete="off" />
              </label>
              <label>
                <span data-i18n="configLlmModel">LLM Model</span>
                <input id="config-llm-model" type="text" autocomplete="off" />
              </label>
              <label>
                <span data-i18n="configLlmApiKey">LLM API Key</span>
                <input id="config-llm-api-key" type="password" autocomplete="off" />
              </label>
            </div>
            <p id="config-save-status" class="maintenance-help"></p>
          </details>
        </section>
        <section class="maintenance-card">
          <div class="maintenance-section-header">
            <div>
              <h3 data-i18n="quickActionsTitle">常用操作</h3>
              <p class="maintenance-help" data-i18n="quickActionsHelp">这些按钮会直接开始，不需要再选任务。</p>
            </div>
          </div>
          <div class="maintenance-action-grid">
            <button type="button" data-maintenance-task="sync_media">
              <strong data-i18n="taskSyncMedia">刷新</strong>
              <span data-i18n="maintenanceTaskSyncMedia">同步动画、字幕、音乐和歌词，并重新生成页面语料</span>
            </button>
            <button type="button" data-maintenance-task="refresh_all">
              <strong data-i18n="taskRefreshAll">完整刷新</strong>
              <span data-i18n="maintenanceTaskRefreshAll">词典、词表和动画库也一起更新；平时不用点这个</span>
            </button>
          </div>
        </section>
        <div id="maintenance-progress" class="maintenance-progress" hidden>
          <div class="maintenance-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <span id="maintenance-progress-fill"></span>
          </div>
          <div id="maintenance-progress-label" class="maintenance-progress-label"></div>
        </div>
        <div class="maintenance-actions">
          <span id="maintenance-status" class="maintenance-status"></span>
        </div>
        <pre id="maintenance-log" class="maintenance-log"></pre>
      </section>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
