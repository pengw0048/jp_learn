<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日语阅读助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1 data-i18n="appName">日语阅读助手</h1>
        <div class="header-actions">
          <div class="lang-switch" aria-label="Language">
            <button id="lang-zh" type="button" data-lang="zh">中</button>
            <button id="lang-en" type="button" data-lang="en">EN</button>
          </div>
          <button id="open-settings" class="compact" type="button" data-i18n="settings">设置</button>
        </div>
      </header>
      <section id="main-view" class="view">
        <button id="toggle-reader" type="button" data-i18n="toggleReader">切换网页阅读模式</button>
        <button id="import-selection" type="button" data-i18n="importSelection">导入当前选中内容</button>
        <button id="pick-area" class="secondary" type="button" data-i18n="pickArea">点选页面文本块</button>
      </section>
      <section id="settings-view" class="view hidden">
        <button id="back-main" class="compact secondary" type="button" data-i18n="back">返回</button>
        <h2 data-i18n="settingsTitle">设置</h2>
        <label>
          <span data-i18n="baseUrl">本地阅读器地址</span>
          <input id="base-url" type="url" />
        </label>
        <button id="save-url" type="button" data-i18n="saveUrl">保存地址</button>
      </section>
      <p id="status" class="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
